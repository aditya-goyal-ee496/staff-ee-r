description = "Generic, workflow-agnostic orchestrator — discovers and drives a self-describing workflow stage-by-stage, honours its gates, enforces model-usage guidelines, and logs every agent to a per-run JSON ledger"

prompt = """
## Orchestrate

Drive any self-describing workflow to completion. You (the orchestrator) run on **Opus**: you plan,
gather inputs, drive stages, adjudicate gates, and record performance — **you never write feature
code yourself**. All logic lives in the workflow; you know only the contract in
`docs/orchestration/workflow-contract.md`.

{{args}}

## Usage

`/orchestrate [workflow] [input] [mode]` — `mode` ∈ gate (default) | checkpoint | autonomous. With no
args, list discovered workflows and ask which to run.

## Process

1. **Resolve the workflow.** `ls docs/orchestration/workflows/*.js`; read the chosen file's
   `export const meta` and extract `meta.orchestrator` (inputs, stages, maxRepairAttempts, emitsLedger,
   commits). With no workflow arg, present candidates via AskUserQuestion. Never invent a workflow.
2. **Check the model guideline.** Cross-check each stage's declared `models` against
   `docs/orchestration/model-usage.md`; warn (don't block) on a violation.
3. **Gather declared inputs.** `source:'arg'` from the argument; `source:'file:<key>'` means you read
   that file and pass its text.
4. **Mint a dated run id + log dir** via Bash (you own timestamps; the sandboxed workflow cannot):
   `DATE=$(date +%F); TS=$(date +%FT%H-%M-%S); RID="<workflow>-$TS-$(uuidgen|tr 'A-Z' 'a-z'|cut -c1-6)";
   mkdir -p ".claude/orchestration/logs/$DATE/$RID/gates"`.
5. **Pick the mode** (default gate) via AskUserQuestion if not passed.
6. **Branch** to `feat/<slice>` if `commits` is true — never operate on `main` (git-rules.md).
7. **Drive stages** in `meta.orchestrator.stages` order. Per stage:
   `Workflow({scriptPath:"docs/orchestration/workflows/<workflow>.js", args:{stage, mode, runId:RID,
   maxRepairAttempts, ...inputs, prior:approvedArtifacts}})`. Append the returned `records` to
   `…/$RID/ledger.jsonl` (one JSON/line; add runId, ts, workflow, stage). On `gate.needsApproval`:
   `kind:'failure'` always escalates; else apply the mode (gate=approve every gate; checkpoint=pause
   only at the commit gate; autonomous=auto-approve). Save gate artifacts under `…/$RID/gates/`.
   Advance to `nextStage`; stop at null.
8. **Finalize.** Write `…/$RID/summary.json`, append a line to `…/logs/index.jsonl`, commit per
   git-rules if approved, and print a per-agent performance summary (label, model, attempts, status,
   verdict; per-model counts; repairs; pass rate) + the log dir.

## Guidelines
DO: stay generic — drive off `meta.orchestrator` + the envelope only; honour every gate in gate mode;
record every agent; warn on model-guideline violations.
DON'T: write feature code; branch on the workflow's name or hard-code stages; skip the ledger; commit
to `main`; mark a task `[x]` the workflow didn't complete.
"""
